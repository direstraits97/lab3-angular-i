<div id="outerconvertercontainer">
  <div class="convertercontainer">
    <h2>Fahrenheit och Celsius</h2>
    <div class="inputcontainer">
      <div class="labelandinput">
        <label for="fahrenheit">Fahrenheit:</label>
        <input
          type="number"
          id="fahrenheit"
          name="fahrenheit"
          (input)="fToC()"
          [(ngModel)]="fahrenheit"
        />
      </div>
      <div class="labelandinput">
        <label for="celsius">Celsius:</label>
        <input type="number" id="celsius" name="celsius" (input)="CtoF()" [(ngModel)]="celsius" />
      </div>
    </div>
  </div>
  <div class="convertercontainer">
    <h2>Meter och Foot</h2>
    <div class="inputcontainer">
      <div class="labelandinput">
        <label for="meter">Meter:</label>
        <input type="number" id="meter" name="meter" (input)="mToF()" [(ngModel)]="meter" />
      </div>
      <div class="labelandinput">
        <label for="foot">Foot:</label>
        <input type="number" id="foot" name="foot" (input)="fToM()" [(ngModel)]="feet" />
      </div>
    </div>
  </div>
</div>
